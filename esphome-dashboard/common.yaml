esphome:
  min_version: 2024.11.0

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - lvgl.widget.show: wifi_icon
  on_disconnect:
    - lvgl.widget.hide: wifi_icon

web_server:
  port: 80

ota:
  - platform: esphome

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - globals.set:
        id: homeassistant_ip
        value: !lambda return client_address;
    - logger.log:
        format: "Client connected: %s"
        args: ['client_address.c_str()']
  on_client_disconnected:
    - lambda: 'id(homeassistant_ip) = "";'
    - logger.log: "Client disconnected"

button:
  - platform: restart
    name: Restart

binary_sensor:
  - platform: status
    name: Status

sensor:
  - id: wifi_signal_db
    name: WiFi Signal
    platform: wifi_signal
    update_interval: 60s
    entity_category: diagnostic

  - id: wifi_signal_strength
    name: WiFi Strength
    platform: copy
    source_id: wifi_signal_db
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: diagnostic

  - platform: uptime
    id: device_uptime
    name: Uptime
    entity_category: diagnostic
    update_interval: 60s

text_sensor:
  - platform: homeassistant
    name: "HomeAssistant Text Sensor"
    entity_id: sensor.dummy_text_sensor
    internal: true

  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: diagnostic
    ssid:
      name: Connected SSID
      entity_category: diagnostic
    mac_address:
      name: Mac Address
      entity_category: diagnostic

  - platform: template
    id: connected_client
    name: Connected Client
    entity_category: diagnostic
    lambda: |-
      if (id(homeassistant_ip).empty()) {
        return std::string("Not connected");
      }
      return id(homeassistant_ip);
    update_interval: 10s

globals:
  - id: homeassistant_ip
    type: std::string
  - id: display_on
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: last_touch_time
    type: uint32_t
    restore_value: false
    initial_value: '0'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              return id(auto_off_enabled) && id(display_on) && (millis() - id(last_touch_time) > 60000); // 60 seconds timeout
          then:
            - logger.log: "Display timeout reached, turning off"
            - light.turn_off: backlight
            - globals.set:
                id: display_on
                value: 'false'