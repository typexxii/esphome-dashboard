# required vars:
# - uid
# - width
# - height
# - entity_id

# button:
<<: !include
  file: ../stateless.yaml
  vars:
    uid: ${uid}
    width: ${width}
    height: ${height}
    icon: "󰝞"
on_short_click:
- homeassistant.service:
    action: media_player.volume_down
    data:
      entity_id: ${entity_id}
on_long_press_repeat:
- homeassistant.service:
    action: media_player.volume_down
    data:
      entity_id: ${entity_id}
