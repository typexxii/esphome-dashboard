# required vars:
# - uid
# - entity_id
# - width
# - height
# - text

# button:
<<: !include
  file: ../stateful.yaml
  vars:
    uid: ${uid}
    entity_id: ${entity_id}
    width: ${width}
    height: ${height}
    icon_on: "󰛨"
    icon_off: "󰌶"
    text: ${text}
on_short_click:
- logger.log: "Toggling switch ${entity_id}"
- homeassistant.service:
    action: switch.toggle
    data:
      entity_id: ${entity_id}
      brightness_pct: '100'
on_long_press:
- homeassistant.service:
    action: switch.turn_on
    data:
      entity_id: ${entity_id}
      brightness_pct: '1'
