# required vars:
# - uid
# - width
# - height
# - icon_on
# - icon_off
# - text

# Mushroom-style button layout
# button:
  id: ${uid}_widget
  width: ${width}
  height: ${height}
  pad_all: 12
  widgets:
    # Icon circle container - OFF state (gray)
    - obj:
        id: ${uid}_icon_circle_off
        width: 50
        height: 50
        radius: 25
        bg_color: 0x42495A
        border_width: 0
        align: LEFT_MID
        scrollbar_mode: "off"
        hidden: true
        widgets:
          - label:
              text: ${icon_off}
              text_font: mdi_md
              text_color: 0x9DA0A6
              align: CENTER
    # Icon circle container - ON state (amber/yellow)
    - obj:
        id: ${uid}_icon_circle_on
        width: 50
        height: 50
        radius: 25
        bg_color: 0x5C4A1A
        border_width: 0
        align: LEFT_MID
        scrollbar_mode: "off"
        hidden: true
        widgets:
          - label:
              text: ${icon_on}
              text_font: mdi_md
              text_color: 0xFFB347
              align: CENTER
    # Icon circle container - UNKNOWN state
    - obj:
        id: ${uid}_icon_circle_unknown
        width: 50
        height: 50
        radius: 25
        bg_color: 0x42495A
        border_width: 0
        align: LEFT_MID
        scrollbar_mode: "off"
        widgets:
          - label:
              text: "\U000F01D8"
              text_font: mdi_md
              text_color: 0x9DA0A6
              align: CENTER
    # Text label to the right of the circle
    - label:
        id: ${uid}_widget_text
        text: ${text}
        text_font: roboto_sm
        align: LEFT_MID
        x: 62
