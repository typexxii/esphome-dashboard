# required vars:
# - uid
# - entity_id
# - width
# - height
# - text

# RGB Light button with color indicator
# button:
  id: ${uid}_widget
  width: ${width}
  height: ${height}
  pad_all: 12
  on_long_press:
  - script.execute:
      id: show_light_control
      light_entity: ${entity_id}
      light_uid: ${uid}
      red: !lambda |-
        std::string raw = id(${uid}_rgb_sensor).state;
        int r = 255, g = 183, b = 71;
        if (raw.length() > 0 && raw != "None" && raw != "null" && (raw.front() == '(' || raw.front() == '[')) {
          std::string c = raw.substr(1, raw.length() - 2);
          int p1 = c.find(',');
          if (p1 != std::string::npos) {
            int p2 = c.find(',', p1 + 1);
            if (p2 != std::string::npos) {
              r = std::atoi(c.substr(0, p1).c_str());
            }
          }
        }
        return r;
      green: !lambda |-
        std::string raw = id(${uid}_rgb_sensor).state;
        int r = 255, g = 183, b = 71;
        if (raw.length() > 0 && raw != "None" && raw != "null" && (raw.front() == '(' || raw.front() == '[')) {
          std::string c = raw.substr(1, raw.length() - 2);
          int p1 = c.find(',');
          if (p1 != std::string::npos) {
            int p2 = c.find(',', p1 + 1);
            if (p2 != std::string::npos) {
              g = std::atoi(c.substr(p1 + 1, p2 - p1 - 1).c_str());
            }
          }
        }
        return g;
      blue: !lambda |-
        std::string raw = id(${uid}_rgb_sensor).state;
        int r = 255, g = 183, b = 71;
        if (raw.length() > 0 && raw != "None" && raw != "null" && (raw.front() == '(' || raw.front() == '[')) {
          std::string c = raw.substr(1, raw.length() - 2);
          int p1 = c.find(',');
          if (p1 != std::string::npos) {
            int p2 = c.find(',', p1 + 1);
            if (p2 != std::string::npos) {
              b = std::atoi(c.substr(p2 + 1).c_str());
            }
          }
        }
        return b;
      brightness: !lambda |-
        std::string raw = id(${uid}_brightness_sensor).state;
        if (raw.length() > 0 && raw != "None" && raw != "null") {
          int bri = std::atoi(raw.c_str());
          if (bri > 0) return bri;
        }
        return 255;
  widgets:
    # Icon circle container - OFF state (gray)
    - obj:
        id: ${uid}_icon_circle_off
        width: 50
        height: 50
        radius: 25
        bg_color: 0x42495A
        border_width: 0
        align: LEFT_MID
        scrollbar_mode: "off"
        hidden: true
        widgets:
          - label:
              text: "󰌶"
              text_font: mdi_md
              text_color: 0x9DA0A6
              align: CENTER
    # Icon circle container - ON state (colored based on light color)
    - obj:
        id: ${uid}_icon_circle_on
        width: 50
        height: 50
        radius: 25
        bg_color: 0x5C4A1A
        border_width: 0
        align: LEFT_MID
        scrollbar_mode: "off"
        hidden: true
        widgets:
          - label:
              id: ${uid}_icon_label
              text: "󰛨"
              text_font: mdi_md
              text_color: 0xFFB347
              align: CENTER
    # Icon circle container - UNKNOWN state
    - obj:
        id: ${uid}_icon_circle_unknown
        width: 50
        height: 50
        radius: 25
        bg_color: 0x42495A
        border_width: 0
        align: LEFT_MID
        scrollbar_mode: "off"
        widgets:
          - label:
              text: "\U000F01D8"
              text_font: mdi_md
              text_color: 0x9DA0A6
              align: CENTER
    # Text label to the right of the circle
    - label:
        id: ${uid}_widget_text
        text: ${text}
        text_font: roboto_sm
        align: LEFT_MID
        x: 62
  on_short_click:
  - homeassistant.service:
      service: light.toggle
      data:
        entity_id: ${entity_id}
