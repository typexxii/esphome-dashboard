- id: auto_off_enabled
  type: bool
  restore_value: yes
  initial_value: 'true'
- id: brightness_level
  type: float
  restore_value: yes
  initial_value: '1.0'
- id: battery_time_status_str
  type: std::string
  restore_value: no
  initial_value: ''
- id: battery_energy_remaining_val
  type: float
  restore_value: no
  initial_value: '0.0'
# Light control panel state
- id: current_light_entity
  type: std::string
  restore_value: no
  initial_value: '""'
- id: current_light_hue
  type: int
  restore_value: no
  initial_value: '30'
- id: current_light_saturation
  type: int
  restore_value: no
  initial_value: '100'
- id: current_light_brightness
  type: int
  restore_value: no
  initial_value: '255'
- id: current_light_kelvin
  type: int
  restore_value: no
  initial_value: '2700'
- id: current_light_mode
  type: std::string
  restore_value: no
  initial_value: '"colour"'
# Temperature light control panel state
- id: current_temp_light_entity
  type: std::string
  restore_value: no
  initial_value: '""'
- id: current_temp_light_kelvin
  type: int
  restore_value: no
  initial_value: '2700'
- id: current_temp_light_brightness
  type: int
  restore_value: no
  initial_value: '255'
# Work state history storage (8 entries max)
- id: work_state_current
  type: std::string
  restore_value: no
  initial_value: '""'
- id: work_state_history
  type: std::string
  restore_value: no
  initial_value: '""'
- id: work_state_history_count
  type: int
  restore_value: no
  initial_value: '0'
