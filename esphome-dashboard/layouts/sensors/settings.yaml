# Settings initialization
settings_init:
  esphome:
    on_boot:
      priority: -100
      then:
      - delay: 500ms
      - lvgl.slider.update:
          id: brightness_slider
          value: !lambda return (int)(id(brightness_level) * 100);
      - light.turn_on:
          id: backlight
          brightness: !lambda return id(brightness_level);
      - if:
          condition:
            lambda: 'return id(auto_off_enabled);'
          then:
          - lvgl.widget.show: auto_off_checked
          - lvgl.widget.hide: auto_off_unchecked
          else:
          - lvgl.widget.hide: auto_off_checked
          - lvgl.widget.show: auto_off_unchecked
      - delay: 500ms
#      - script.execute: update_battery_display

