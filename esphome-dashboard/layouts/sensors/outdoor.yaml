Front_light_sensors: !include { file: ../widgets/buttons/icon_text_buttons/rgb_light_buttons/sensors.yaml, vars: { uid: front_door, entity_id: light.front_door} }
Back_light_sensors: !include { file: ../widgets/buttons/icon_text_buttons/rgb_light_buttons/sensors.yaml, vars: { uid: back_door, entity_id: light.back_deck } }
Side_light_sensors: !include { file: ../widgets/buttons/icon_text_buttons/simple_light_buttons/sensors.yaml, vars: { uid: side_door, entity_id: light.side_deck } }
Soffit_light_sensors: !include { file: ../widgets/buttons/icon_text_buttons/simple_light_buttons/sensors.yaml, vars: { uid: soffit_light, entity_id: light.soffit_lights } }
Flood_light_sensors: !include { file: ../widgets/buttons/icon_text_buttons/simple_light_buttons/sensors.yaml, vars: { uid: flood_light, entity_id: light.house_front_floodlight } }
