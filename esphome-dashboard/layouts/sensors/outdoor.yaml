# Outdoor temperature sensor
outdoor_temp_sensor:
  sensor:
  - id: outdoor_temp
    platform: homeassistant
    entity_id: sensor.weather_station_outdoor_temperature
    on_value:
    - lvgl.label.update:
        id: outdoor_temp_value
        text: !lambda return std::to_string(std::round(x * 10) / 10.0).substr(0, std::to_string(std::round(x * 10) / 10.0).find(".") + 2) + "°C";

# Outdoor humidity sensor
outdoor_humidity_sensor:
  sensor:
  - id: outdoor_humidity
    platform: homeassistant
    entity_id: sensor.weather_station_humidity
    on_value:
    - lvgl.label.update:
        id: outdoor_humidity_value
        text: !lambda return std::to_string(std::round(x * 10) / 10.0).substr(0, std::to_string(std::round(x * 10) / 10.0).find(".") + 2) + "%";

