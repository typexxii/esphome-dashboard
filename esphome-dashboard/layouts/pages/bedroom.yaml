id: bedroom
pad_top: 50
pad_bottom: 50
scrollbar_mode: "off"
on_load:
- lvgl.label.update:
    id: page_title
    text: Bedroom
widgets:
- obj:
    width: 100%
    height: 100%
    border_width: 0
    radius: 0
    pad_top: 0
    pad_bottom: 0
    pad_left: 6
    pad_right: 6
    scrollbar_mode: "off"
    scrollable: false
    layout:
      type: FLEX
      flex_flow: ROW_WRAP
      flex_align_main: START
      pad_column: 8
      pad_row: 10
    widgets:
    # Separator at the top
    - obj:
        width: 100%
        height: 2
        bg_color: 0x555555
        border_width: 0
        radius: 1
        scrollbar_mode: "off"

    - button:
         <<: !include
           file: ../widgets/buttons/icon_text_buttons/temperature_light_buttons/widget.yaml
           vars:
             uid: adrian_light
             entity_id: light.kajplats_e26_ws_globe_1100lm_2
             text: Adrian
             width: 49%
             height: 86



    - button:
        <<: !include
          file: ../widgets/buttons/icon_text_buttons/temperature_light_buttons/widget.yaml
          vars:
            uid: zoe_light
            entity_id: light.kajplats_e26_ws_globe_1100lm
            text: Zoe
            width: 49%
            height: 86
   
    - button:
        # Style RGB Light (with color control)
        <<: !include
          file: ../widgets/buttons/icon_text_buttons/rgb_light_buttons/widget.yaml
          vars:
            uid: wall_light
            entity_id: light.varmblixt_table_wall_lamp
            text: Wall
            width: 49%
            height: 86

    - button:
        <<: !include
          file: ../widgets/buttons/icon_text_buttons/temperature_light_buttons/widget.yaml
          vars:
            uid: fan_light
            entity_id: light.white_series_lightfan_module_light_1
            text: Ceiling
            width: 49%
            height: 86
       

    # Separator before Temp/Humidity
    - obj:
        width: 100%
        height: 2
        bg_color: 0x555555
        border_width: 0
        radius: 1
        scrollbar_mode: "off"
    - obj:
        # temperature sensor
        width: 49%
        height: 70
        bg_opa: TRANSP
        border_width: 0
        scrollbar_mode: "off"
        widgets:
        - label:
            text_font: mdi_xl
            text: "\U000F050F"
            text_color: 0xFF5252
            align: LEFT_MID
            x: -10
        - label:
            text: "Temperature"
            text_font: roboto_sm
            text_color: 0x888888
            align: LEFT_MID
            x: 30
            y: -18
        - label:
            id: bedroom_temp_value
            text: "..."
            text_font: roboto_xl
            align: LEFT_MID
            x: 30
            y: 14
    
    - obj:
        # humidity sensor
        width: 49%
        height: 70
        bg_opa: TRANSP
        border_width: 0
        scrollbar_mode: "off"
        widgets:
        - label:
            text_font: mdi_xl
            text: "\U000F058E"
            text_color: 0x00CCFF
            align: LEFT_MID
            x: -10
        - label:
            text: "Humidity"
            text_font: roboto_sm
            text_color: 0x888888
            align: LEFT_MID
            x: 30
            y: -18
        - label:
            id: bedroom_humidity_value
            text: "..."
            text_font: roboto_xl
            align: LEFT_MID
            x: 30
            y: 14
